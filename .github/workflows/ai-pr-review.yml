name: AI PR Reviewer

on:
  pull_request:
    branches:
      - main
    paths:
      - '**.tf'  # Only triggers when Terraform files change

jobs:
  ai-review:
    name: AI Terraform Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Get changed Terraform files
        id: changed-files
        run: |
          echo "Changed TF files:"
          git diff --name-only origin/main...HEAD -- '*.tf' | tee changed_files.txt
          cat changed_files.txt

      - name: Run AI PR Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import anthropic
          import os
          import subprocess

          # Get changed terraform files
          with open('changed_files.txt') as f:
              changed_files = [l.strip() for l in f.readlines() if l.strip()]

          if not changed_files:
              print("No Terraform files changed — skipping AI review")
              exit(0)

          # Read all changed files
          all_code = ""
          for file in changed_files:
              if os.path.exists(file):
                  with open(file) as f:
                      all_code += f"\n\n# File: {file}\n{f.read()}"

          if not all_code.strip():
              print("No code to review")
              exit(0)

          print(f"Reviewing {len(changed_files)} Terraform file(s)...")

          # Call Claude API
          api_key = os.environ.get("ANTHROPIC_API_KEY")

          if not api_key:
              print("No API key — using mock review")
              review = """## AI Terraform Code Review

### Critical Issues
- Review requires ANTHROPIC_API_KEY secret to be configured

### How to fix
- Add ANTHROPIC_API_KEY to GitHub repository secrets

### Note
- All other pipeline checks (validate, plan, security scan) still run normally"""
          else:
              try:
                  client = anthropic.Anthropic(api_key=api_key)
                  message = client.messages.create(
                      model="claude-sonnet-4-5",
                      max_tokens=1024,
                      messages=[{
                          "role": "user",
                          "content": f"""You are a senior DevOps engineer reviewing Terraform code for Azure infrastructure.

Review this Terraform code and identify:
1. Security issues (open ports, public access, missing encryption)
2. Missing required tags
3. Misconfigurations
4. Best practice violations
5. What looks good

Format response as:
## AI Terraform Code Review

### Critical Issues
- list issues

### Warnings
- list warnings

### Passed Checks
- list what looks good

### Recommendations
- list improvements

Code to review:
{all_code}"""
                      }]
                  )
                  review = message.content[0].text
                  print("AI review completed successfully")
              except Exception as e:
                  review = f"""## AI Terraform Code Review

### Status
AI review encountered an error: {str(e)}

### Note
Manual review recommended. All other pipeline checks still run normally."""

          # Post review as PR comment
          import urllib.request
          import json

          pr_number = os.environ.get("PR_NUMBER")
          repo = os.environ.get("GITHUB_REPOSITORY")
          token = os.environ.get("GITHUB_TOKEN")

          if pr_number and repo and token:
              url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments"
              data = json.dumps({"body": review}).encode()
              req = urllib.request.Request(url, data=data, headers={
                  "Authorization": f"token {token}",
                  "Content-Type": "application/json",
                  "User-Agent": "AI-PR-Reviewer"
              })
              try:
                  urllib.request.urlopen(req)
                  print("Review posted as PR comment!")
              except Exception as e:
                  print(f"Could not post comment: {e}")
                  print("Review output:")
                  print(review)
          else:
              print("Review output:")
              print(review)
          EOF
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}